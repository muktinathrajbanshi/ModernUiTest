<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>Mukti.dev</h1>
      <nav>
        <a href="#">Home</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
      <h2 id="typing"></h2>
      <p>Creative Developer | AI Enthusiast</p>
      <button>Hire Me</button>
    </section>

    <!-- Skills -->
    <section class="skills">
      <h2>My Skills</h2>
      <div class="skill">
        <p>HTML</p>
        <div class="bar"><span style="width: 90%"></span></div>
      </div>
      <div class="skill">
        <p>CSS</p>
        <div class="bar"><span style="width: 85%"></span></div>
      </div>
      <div class="skill">
        <p>JavaScript</p>
        <div class="bar"><span style="width: 80%"></span></div>
      </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="projects">
      <h2>Projects</h2>
      <div class="cards">
        <div class="card">
          <h3>AI Music Generator</h3>
          <p>Generate music using AI</p>
        </div>

        <div class="card">
          <h3>Face Recognition</h3>
          <p>Attendance system using AI</p>
        </div>

        <div class="card">
          <h3>Modern UI App</h3>
          <p>Beautiful frontend design</p>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
